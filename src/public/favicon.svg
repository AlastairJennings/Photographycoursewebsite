<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with gradient -->
  <rect width="32" height="32" rx="6" fill="url(#bgGradient)" />
  
  <!-- Camera Body -->
  <rect x="6" y="11" width="20" height="14" rx="2" fill="white" opacity="0.95" />
  
  <!-- Lens -->
  <circle cx="16" cy="18" r="5" fill="#334155" opacity="0.3" />
  <circle cx="16" cy="18" r="3.5" fill="white" opacity="0.8" />
  <circle cx="16" cy="18" r="2" fill="#334155" opacity="0.4" />
  
  <!-- Viewfinder -->
  <rect x="11" y="8" width="10" height="3" rx="1" fill="white" opacity="0.9" />
  
  <!-- Flash/Button -->
  <circle cx="22" cy="14" r="1.2" fill="#ef4444" opacity="0.8" />
</svg>
